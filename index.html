<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dalton Strang — Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }

body {
  background: #000;
  color: #fff;
  overflow-x: hidden;
}
:root{
  --surface:#fbfbfa;
  --text:#111;
  --muted:rgba(0,0,0,.55);
}
html{scroll-behavior:smooth;}
::selection{background:#fff;color:#000;}

a:focus-visible, button:focus-visible, .square:focus-visible{
 outline:3px solid #107dff;
 outline-offset:4px;
}
@media (prefers-reduced-motion: reduce){
 *{
   animation:none !important;
   transition:none !important;
   scroll-behavior:auto !important;
 }
}

/* ── REFINED CURSOR ── */
#cursor {
  position: fixed;
  width: 6px; height: 6px;
  background: #fff;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  mix-blend-mode: difference;
  transition: width .3s cubic-bezier(0.215, 0.610, 0.355, 1), height .3s cubic-bezier(0.215, 0.610, 0.355, 1);
  display: none;
}
#cursor.expanded { width: 50px; height: 50px; }

@media (hover: hover) and (pointer: fine) {
  body { cursor: none; }
  #cursor { display: block; }
}

/* ── BACKGROUND GALLERY ── */
.background-gallery {
  position: fixed; inset: 0; overflow: hidden; z-index: 1;
}
.bg-slide {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scale(1.04);
  filter:none;
}
.background-gallery:after{
 content:'';
 position:absolute;
 inset:0;
 pointer-events:none;
}

/* ── TYPOGRAPHIC NAV BAR ── */
.nav {
  position: fixed; 
  top: 0; left: 0; right: 0;
  height: 120px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 60px;
  z-index: 100;
  mix-blend-mode: difference;
}
.nav-brand-group {
  display: flex; flex-direction: column; gap: 4px;
}
.nav-logo {
  font-size: 16px; font-weight: 500; letter-spacing: -0.01em; color: #fff; text-decoration: none;
}
.nav-email {
  font-size: 13px; font-weight: 400; color: rgba(255, 255, 255, 0.55); text-decoration: none; letter-spacing: -0.01em; transition: color 0.2s;
}
.nav-email:hover { color: #fff; }

.nav-center-group {
  display: flex; align-items: center; gap: 60px;
}
.nav-links {
  display: flex; gap: 40px; font-size: 15px; font-weight: 400;
}
.nav-item {
  color: rgba(255, 255, 255, 0.55); text-decoration: none; transition: color 0.2s;
}
.nav-item:hover, .nav-item.active { color: #fff; }

/* ── MAIN ROUTER WRAPPER ── */
#viewRouter {
  position: relative;
  width: 100%;
  z-index: 10;
}

/* ── HOME / INDEX VIEW ── */
.home-view {
  position: fixed; inset: 0; 
  opacity: 1; visibility: visible;
  pointer-events: all;
  touch-action: none;
}

.square-container {
  position: fixed;
  left: 60px; bottom: 60px;
  width: 30vw; min-width: 480px;
  aspect-ratio: 1;
  z-index: 40;
}

.square {
  width: 100%; height: 100%;
  background: #fbfbfa;
  overflow: hidden;
  position: relative;
  border-radius: 16px;
  box-shadow: 0 30px 120px rgba(0,0,0,.28);
  backdrop-filter: blur(10px);
}

.title-slide {
  position: absolute; inset: 0;
  color: #000;
  display: flex; flex-direction: column;
  justify-content: space-between;
  padding: 50px;
}
.project-number {
  font-size: 13px; font-weight: 500; letter-spacing: -0.01em; color: rgba(0,0,0,.35);
}
.project-title {
  font-size: clamp(2.4rem, 3.2vw, 4.2rem);
  line-height: 0.95; letter-spacing: -0.04em; font-weight: 500;
}
.word { display: inline-block; margin-right: .18em; }
.project-tags {
  font-size: 14px; font-weight: 400; color: rgba(0,0,0,.45); line-height: 1.6; letter-spacing: -0.01em;
}

/* ── FLAT PAGE LAYOUTS ── */
.page-view {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  background: #fbfbfa;
  color: #000;
  opacity: 0; 
  visibility: hidden;
  pointer-events: none;
}

.case-hero {
  width: 100%; height: 75vh;
  background: #fbfbfa;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 220px 100px 80px 100px;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
.case-hero .project-number {
  font-size: 15px; font-weight: 500; letter-spacing: -0.01em; color: rgba(0,0,0,.45);
}
.case-hero .project-title {
  font-size: clamp(3.8rem, 6.8vw, 8rem);
  max-width: 85%;
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 1.05;
}
.case-hero .project-tags {
  font-size: 18px; font-weight: 400; color: rgba(0,0,0,.5); letter-spacing: -0.01em;
}

.case-body {
  max-width: 1440px;
  margin: 0 auto;
  padding: 120px 100px 0 100px;
  display: flex; flex-direction: column; gap: 140px;
}

.editorial-intro {
  display: grid; grid-template-columns: 2fr 1.5fr; gap: 100px; align-items: start;
}
.section-label {
  font-size: 14px; font-weight: 500; letter-spacing: -0.01em; color: rgba(0,0,0,.35);
}
.case-desc {
  font-size: clamp(1.6rem, 2.2vw, 2.5rem);
  line-height: 1.45; color: rgba(0,0,0,0.85); font-weight: 400; letter-spacing: -0.02em;
}

.specs-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px;
  border-top: 1px solid rgba(0,0,0,.06); border-bottom: 1px solid rgba(0,0,0,.06);
  padding: 60px 0;
}
.spec-label {
  font-size: 13px; font-weight: 500; letter-spacing: -0.01em; color: rgba(0,0,0,.35); margin-bottom: 14px;
}
.spec-value { font-size: 20px; font-weight: 400; color: rgba(0,0,0,.8); letter-spacing: -0.01em; line-height: 1.4; }

/* ── EXPERIENCE SECTION ── */
.resume-container {
  display: flex; flex-direction: column; gap: 48px; width: 100%;
}
.resume-row {
  display: grid; grid-template-columns: 1.5fr 3fr 1fr; gap: 20px; padding: 24px 0; border-bottom: 1px solid rgba(0,0,0,0.06);
}
.resume-row:first-child { border-top: 1px solid rgba(0,0,0,0.06); }
.resume-org { font-size: 18px; font-weight: 500; color: #000; }
.resume-role { font-size: 18px; font-weight: 400; color: rgba(0,0,0,0.8); }
.resume-period { font-size: 15px; font-weight: 400; color: rgba(0,0,0,0.4); text-align: right; }

.case-visuals {
  display: flex; flex-direction: column; gap: 4px;
}
.img-container img { width: 100%; height: auto; display: block; filter: grayscale(15%); transition: filter 0.5s; }
.img-container img:hover { filter: grayscale(0%); }

.palette-section {
  display: grid; grid-template-columns: 2fr 1.5fr; gap: 100px;
}
.palette-row { display: flex; gap: 2px; height: 44px; width: 100%; }
.palette-swatch { flex: 1; height: 100%; }

.process-section {
  display: grid; grid-template-columns: 1fr 2.2fr; gap: 100px;
}
.process-steps { display: flex; flex-direction: column; }
.process-step {
  display: flex; gap: 60px; align-items: flex-start;
  padding: 44px 0; border-bottom: 1px solid rgba(0,0,0,.05);
}
.process-step:first-child { border-top: 1px solid rgba(0,0,0,.05); }
.step-num { font-size: 15px; font-weight: 500; color: rgba(0,0,0,.3); letter-spacing: -0.01em; }
.step-text { font-size: 21px; line-height: 1.55; color: rgba(0,0,0,.75); font-weight: 400; letter-spacing: -0.015em; }

/* ── FULL WIDTH SECURE FOOTER ── */
.footer-nav {
  width: 100vw;
  position: relative;
  left: 50%;
  right: 50%;
  margin-left: -50vw;
  margin-right: -50vw;
  margin-top: 140px;
  padding: 100px 100px;
  background: #000;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.btn-group {
  display: flex;
  gap: 20px;
  
}
.back-btn {
  font-size: 15px; font-weight: 500; background: #fff; color: #000; border: none;
  letter-spacing: -0.01em; padding: 18px 38px; border: 1px solid #fff;
  transition: background 0.3s, color 0.3s, border-color 0.3s;
  border-radius: 16px;
}
.back-btn:hover { background: #000; color: #fff; border-color: rgba(255,255,255,0.4); }

.next-btn {
  font-size: 15px; font-weight: 500; background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.25);
  letter-spacing: -0.01em; padding: 18px 38px;
  transition: background 0.3s, color 0.3s, border-color 0.3s;
  border-radius: 16px;
}
.next-btn:hover { background: #fff; color: #000; border-color: #fff; }
img { border-radius: 16px; }

/* ── RESPONSIVE BREAKPOINTS ── */
@media(max-width:1024px) {
  .nav { padding: 0 30px; height: 90px; }
  .nav-center-group { gap: 30px; }
  .editorial-intro, .palette-section, .process-section { grid-template-columns: 1fr; gap: 32px; }
  .specs-grid { grid-template-columns: 1fr 1fr; }
  .case-hero { padding: 160px 50px 50px 50px; }
  .case-body { padding: 80px 50px 0 50px; gap: 100px; }
  .footer-nav { margin-top: 100px; padding: 60px 50px; flex-direction: column; gap: 24px; align-items: stretch; }
  .btn-group { flex-direction: column; }
  .resume-row { grid-template-columns: 1fr; gap: 8px; }
  .resume-period { text-align: left; }
}

@media(max-width:768px){
  .nav{
    height: auto;
    padding: 24px 20px;
    align-items: flex-start;
    flex-direction: row;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
  }
  .nav-brand-group {
    gap: 2px;
  }
  .nav-center-group {
    gap: 16px;
  }
  .nav-links {
    gap: 16px;
  }
  
  .square-container { 
    left: 20px; 
    right: 20px; 
    bottom: 40px; 
    width: auto; 
    height: auto; 
    aspect-ratio: auto; 
    min-width: 0; 
  }
  .square {
    height: 200px;
  }
  /* FORCE TITLE SLIDES ON MOBILE TO POSITION ABSOLUTELY INSIDE CONTAINMENT FIELD */
  .title-slide {
    position: absolute;
    inset: 0;
    padding: 30px 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .project-title{
    line-height: 1.05;
    font-size: clamp(1.8rem, 6.5vw, 2.6rem);
    letter-spacing: -0.02em;
  }
  
  .case-hero {
    padding: 140px 24px 40px 24px;
    height: auto;
    gap: 40px;
  }
  .case-hero .project-title{
    max-width:100%;
    font-size:clamp(2.4rem, 9vw, 4rem);
  }
  .case-body {
    padding: 60px 24px 0 24px;
    gap: 80px;
  }
  .specs-grid{
    grid-template-columns:1fr;
    gap: 24px;
    padding: 40px 0;
  }
  .footer-nav {
    margin-top: 80px;
    padding: 60px 24px;
  }
}
</style>
</head>

<div class="background-gallery"></div>

<div class="nav" role="navigation" aria-label="Primary navigation">

</div>

<script>
const projects=[

let current=0;
let animating=false;
let currentView = 'index'; 

const gallery=document.querySelector(".background-gallery");
const squareContainer=document.getElementById("squareContainer");
const square=document.getElementById("square");
const homeView=document.getElementById("homeView");
const pageView=document.getElementById("pageView");
const cursor=document.getElementById("cursor");

document.getElementById("totalIndexStr").textContent = String(projects.length).padStart(2,"0");

/* ── CURSOR INTERACTION ENGINE ── */
let mx=window.innerWidth/2, my=window.innerHeight/2;
let cx=mx, cy=my;
let isTouchDevice = false;

if (window.matchMedia("(pointer: coarse)").matches) {
  isTouchDevice = true;
}

if (!isTouchDevice) {
  document.addEventListener("mousemove",(e)=>{mx=e.clientX;my=e.clientY;});
  (function animCursor(){
    cx+=(mx-cx)*.12; cy+=(my-cy)*.12;
    cursor.style.left=cx+"px"; cursor.style.top=cy+"px";
    requestAnimationFrame(animCursor);
  })();
}

function setupCursorHovers() {
  if (isTouchDevice) return;
  const elements = [
    square, 
    document.getElementById("navAbout"), 
    document.getElementById("navIndex"), 
    document.getElementById("brandLogo")
  ];
  elements.forEach(el => {
    if(!el) return;
    el.addEventListener("mouseenter",()=>cursor.classList.add("expanded"));
    el.addEventListener("mouseleave",()=>cursor.classList.remove("expanded"));
  });
}

function bindDynamicButtons() {
  const backBtn = document.getElementById("caseBackBtn");
  const nextBtn = document.getElementById("caseNextBtn");
  
  if(!isTouchDevice) {
    [backBtn, nextBtn].forEach(btn => {
      if(!btn) return;
      btn.addEventListener("mouseenter",()=>cursor.classList.add("expanded"));
      btn.addEventListener("mouseleave",()=>cursor.classList.remove("expanded"));
    });
  }

  if(backBtn) backBtn.addEventListener("click", (e) => { e.preventDefault(); switchView('index'); });
  if(nextBtn) nextBtn.addEventListener("click", (e) => { e.preventDefault(); navigateNextProject(); });
}

/* ── DOM GENERATORS ── */
function splitWords(text){
  return text.split(" ").map(w=>`<span class="word">${w}</span>`).join(" ");
}
function createBG(src){
  const img=document.createElement("img");
  img.src=src; img.className="bg-slide";
  gallery.appendChild(img); return img;
}
function createTitle(index){
  const p=projects[index];
  const wrap=document.createElement("div");
  wrap.className="title-slide";
  wrap.innerHTML=`
    <div class="project-number">${String(index+1).padStart(2,"0")} — ${String(projects.length).padStart(2,"0")}</div>
    <h1 class="project-title">${splitWords(p.title)}</h1>
    <div class="project-tags">${p.tags.join(" &nbsp;·&nbsp; ")}</div>
  `;
  square.appendChild(wrap); return wrap;
}

createBG(projects[0].bg);
createTitle(0);

// Initialize initial layout bounds cleanly
if (window.innerWidth <= 768) {
  const initialSlide = square.querySelector(".title-slide");
  gsap.set(square, { height: initialSlide.offsetHeight });
}

setupCursorHovers();

          </div>
          <div class="resume-row">
            <div class="resume-org">Development Axis</div>
            <div class="resume-role">HTML5/CSS3 Core, Modern Vanilla JavaScript (ES6+), State Management UI, Git/Version Automation, Python Automation Scripts</div>
            <div class="resume-period">Expertise</div>
          </div>
        </div>
      </div>

      <div class="footer-nav">
        <button class="back-btn" id="caseBackBtn">Return to Index</button>
        <div></div>
      </div>
    `;
  } else {
    const p = projects[current];
    const nextIndex = (current + 1) % projects.length;
    const nextProjectTitle = projects[nextIndex].title;

    return `
      <div class="editorial-intro">
        <div class="section-label">Case Analysis</div>
        <p class="case-desc">${p.desc}</p>
      </div>
      <div class="specs-grid">
        <div><div class="spec-label">Scope</div><div class="spec-value">${p.scope}</div></div>
        <div><div class="spec-label">Client</div><div class="spec-value">${p.client}</div></div>
        <div><div class="spec-label">Duration</div><div class="spec-value">${p.duration}</div></div>
        <div><div class="spec-label">Timeline</div><div class="spec-value">${p.year}</div></div>
      </div>
      <div class="case-visuals">
        <div class="img-container"><img src="${p.images[0]}" alt="Project showcase image"></div>
        <div class="img-container"><img src="${p.images[1]}" alt="Project showcase image"></div>
      </div>
      <div class="palette-section">
        <div class="section-label">System Swatches</div>
        <div class="palette-row">${p.palette.map(c=>`<div class="palette-swatch" style="background:${c}"></div>`).join("")}</div>
      </div>
      <div class="process-section">
        <div class="section-label">Implementation Steps</div>
        <div class="process-steps">${p.process.map((s,i)=>`
          <div class="process-step">
            <div class="step-num">${String(i+1).padStart(2,"0")}</div>
            <div class="step-text">${s}</div>
          </div>`).join("")}
        </div>
      </div>
      <div class="footer-nav">
        <button class="back-btn" id="caseBackBtn">Return to Index</button>
        <div class="btn-group">
          <button class="next-btn" id="caseNextBtn">Next: ${nextProjectTitle}</button>
        </div>
      </div>
    `;
  }
}

function updateNavStyles(targetView) {
  document.getElementById("navIndex").classList.remove("active");
  document.getElementById("navAbout").classList.remove("active");
  
  if (targetView === 'index') {
    document.getElementById("navIndex").classList.add("active");
  } else if (targetView === 'about') {
    document.getElementById("navAbout").classList.add("active");
  }
}

/* ── ARCHITECTURAL VIEW ROUTER ── */
function switchView(target) {
  if (animating || currentView === target) return;
  animating = true;

  updateNavStyles(target);

  const oldViewEl = currentView === 'index' ? homeView : pageView;
  const newViewEl = target === 'index' ? homeView : pageView;

  const tl = gsap.timeline({
    onComplete: () => {
      gsap.set(oldViewEl, { visibility: "hidden", pointerEvents: "none" });
      
      if (target !== 'index') {
        if (target === 'about') {
          document.getElementById("caseOverline").textContent = "Dalton Strang";
          document.getElementById("caseTitle").textContent = "Design Practice & Systems";
          document.getElementById("caseTags").textContent = "Product Designer & Front-End Engineer";
        } else {
          const p = projects[current];
          document.getElementById("caseOverline").textContent = `${p.client} — ${p.year}`;
          document.getElementById("caseTitle").textContent = p.title;
          document.getElementById("caseTags").textContent = p.tags.join("  ·  ");
        }
        document.getElementById("caseBodyContent").innerHTML = generateViewHTML(target);
        bindDynamicButtons();
      }

      window.scrollTo(0, 0);
      currentView = target;

      gsap.set(newViewEl, { visibility: "visible", pointerEvents: "all" });
      
      gsap.timeline({
        onComplete: () => { 
          animating = false; 
          setupCursorHovers(); 
          // Recalculate heights on returning back to index
          if(target === 'index' && window.innerWidth <= 768) {
            const activeSlide = square.querySelector(".title-slide");
            if(activeSlide) gsap.set(square, { height: activeSlide.offsetHeight });
          }
        }
      })
      .to(newViewEl, { opacity: 1, duration: 0.4, ease: "power2.out" })
      .fromTo(target === 'index' ? ".square-container" : [".case-hero", ".case-body"], 
        { y: 15 }, { y: 0, duration: 0.5, ease: "power3.out" }, 0
      );
    }
  });

  tl.to(oldViewEl, { opacity: 0, duration: 0.3, ease: "power2.inOut" });
}

/* ── SEAMLESS CASE-TO-CASE NAVIGATION ── */
function navigateNextProject() {
  if (animating) return;
  animating = true;

  let next = current + 1;
  if (next >= projects.length) next = 0;

  document.getElementById("currentIndexStr").textContent = String(next+1).padStart(2,"0");
  const currentBG = gallery.querySelector(".bg-slide:last-child");
  const nextBG = createBG(projects[next].bg);
  
  gsap.set(nextBG, { clipPath: "inset(100% 0 0 0)" });

  square.innerHTML = "";
  current = next;

  const tl = gsap.timeline({
    onComplete: () => {
      currentBG.remove();
      createTitle(next);
      animating = false;
    }
  });

  tl.to(pageView, { opacity: 0, y: -20, duration: 0.25, ease: "power2.in" });
  tl.to(nextBG, { clipPath: "inset(0% 0 0 0%)", duration: 0.65, ease: "power3.inOut" }, 0);
  tl.call(() => {
    document.getElementById("caseBodyContent").innerHTML = ""; 
    const p = projects[current];
    document.getElementById("caseOverline").textContent = `${p.client} — ${p.year}`;
    document.getElementById("caseTitle").textContent = p.title;
    document.getElementById("caseTags").textContent = p.tags.join("  ·  ");
    document.getElementById("caseBodyContent").innerHTML = generateViewHTML('project');
    bindDynamicButtons();
    window.scrollTo(0, 0);
  }, null, 0.25);
  tl.to(pageView, { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" }, 0.28);
}

/* ── CORE COMPONENT CONTROLLER LINKS ── */
square.addEventListener("click", () => switchView('project'));

square.addEventListener("keydown",(e)=>{
 if(e.key==="Enter" || e.key===" "){
   e.preventDefault();
   switchView('project');
 }
});

document.getElementById("navAbout").addEventListener("click", (e) => { e.preventDefault(); switchView('about'); });
document.getElementById("navIndex").addEventListener("click", (e) => { e.preventDefault(); switchView('index'); });
document.getElementById("brandLogo").addEventListener("click", (e) => { e.preventDefault(); switchView('index'); });

/* ── REFINED SLIDE ENGINE ── */
function goTo(next, direction=1){
  if(animating || currentView !== 'index') return;
  if(next < 0) next = projects.length - 1;
  if(next >= projects.length) next = 0;
  animating = true;

  document.getElementById("currentIndexStr").textContent = String(next+1).padStart(2,"0");

  const currentBG = gallery.querySelector(".bg-slide:last-child");
  const currentTitle = square.querySelector(".title-slide:last-child");

  const nextBG = createBG(projects[next].bg);
  const nextTitle = createTitle(next);

  // Absolute-position layout alignment parameters on setup
  gsap.set(nextBG, { clipPath: direction > 0 ? "inset(100% 0 0 0)" : "inset(0 0 100% 0)" });
  gsap.set(nextTitle, { opacity: 0, y: direction > 0 ? 40 : -40 });

  const words = nextTitle.querySelectorAll(".word");
  const tl = gsap.timeline({
    onComplete(){
      currentBG.remove();
      currentTitle.remove();
      current = next;
      animating = false;
    }
  });

  tl.to(nextBG, { clipPath: "inset(0% 0 0 0)", duration: 1.0, ease: "power4.inOut" }, 0);
  
  /* ── SMOOTH STATE TWEENING ENGINE FOR MOBILE BREAKPOINT ── */
  if (window.innerWidth <= 768) {
    // 1. Force absolute stacking properties via CSS injection to stop layout engine expansion
    gsap.set([currentTitle, nextTitle], { position: "absolute", left: 0, top: 0, width: "100%" });
    
    // 2. Programmatically fetch target text layout dimensions cleanly
    const targetHeight = nextTitle.offsetHeight;
    
    // 3. Perform a smooth, micro-managed height tween between active content structures
    tl.to(square, { 
      height: targetHeight, 
      duration: 0.6, 
      ease: "power3.inOut" 
    }, 0);
  } else {
    // Desktop mechanical shifts
    tl.to(squareContainer, { scaleY: 1.01, duration: 0.25, ease: "power2.out" }, 0);
    tl.to(squareContainer, { scaleY: 1, duration: 0.4, ease: "power4.out" }, 0.25);
  }

  tl.to(currentTitle, { y: direction > 0 ? -40 : 40, opacity: 0, duration: 0.45, ease: "power3.in" }, 0);
  tl.to(nextTitle, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.3);
  tl.fromTo(words, { y: 24, opacity: 0 }, { y: 0, opacity: 1, stagger: 0.02, duration: 0.5, ease: "power4.out" }, 0.32);
}

/* ── EVENT ROUTERS ── */
window.addEventListener("wheel", (e) => {
  if (animating || currentView !== 'index') return;
  if (Math.abs(e.deltaY) < 10) return; 
  if (e.deltaY > 0) goTo(current + 1, 1); else goTo(current - 1, -1);
}, { passive: true });

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && currentView !== 'index') { switchView('index'); return; }
  
  if (e.key === "ArrowDown" || e.key === "ArrowRight") { 
    if(currentView === 'project') navigateNextProject(); 
    else if(currentView === 'index') goTo(current + 1, 1); 
  }
  if (e.key === "ArrowUp" || e.key === "ArrowLeft") { 
    if(currentView === 'index') goTo(current - 1, -1); 
  }
});

/* ── REFACTORED TOUCH ROUTINES FOR DETECTING EXCLUSIVE VERTICAL SWIPES ── */
let touchStartX = 0;
let touchStartY = 0;

window.addEventListener("touchstart", (e) => { 
  touchStartX = e.touches[0].clientX; 
  touchStartY = e.touches[0].clientY;
}, { passive: true });

window.addEventListener("touchend", (e) => {
  if (currentView !== 'index' || animating) return;
  
  const diffX = touchStartX - e.changedTouches[0].clientX;
  const diffY = touchStartY - e.changedTouches[0].clientY;
  
  if (Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > 40) {
    if (diffY > 0) {
      goTo(current + 1, 1);  
    } else {
      goTo(current - 1, -1); 
    }
  }
});

// Window resize safety handler to reset heights across viewport adjustments
window.addEventListener("resize", () => {
  if(currentView === 'index' && window.innerWidth <= 768) {
    const activeSlide = square.querySelector(".title-slide");
    if(activeSlide) gsap.set(square, { height: activeSlide.offsetHeight });
  } else {
    gsap.set(square, { height: "100%" });
  }
});
</script>
</body>
