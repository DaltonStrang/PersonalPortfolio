<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }

body { background: #000; color: #fff; overflow-x: hidden; }
:root { --surface:#fbfbfa; --text:#111; --muted:rgba(0,0,0,.55); }
html { scroll-behavior: smooth; }
::selection { background:#fff; color:#000; }

a:focus-visible, button:focus-visible, .square:focus-visible {
  outline: 3px solid #107dff; outline-offset: 4px;
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
}

/* ── CURSOR ── */
#cursor {
  position: fixed;
  width: 6px; height: 6px;
  background: #fff;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform-origin: center center;
  mix-blend-mode: difference;
  display: none;
  will-change: transform, left, top;
}
#cursor.expanded { width: 50px; height: 50px; border-radius: 50%; }

@media (hover: hover) and (pointer: fine) {
  body { cursor: none; }
  #cursor { display: block; }
}

/* ── BACKGROUND GALLERY ── */
.background-gallery {
  position: fixed; inset: 0; overflow: hidden; z-index: 1;
}
.bg-slide {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scale(1.08);
  transform-origin: center center;
  will-change: transform;
}
.background-gallery:after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.65), rgba(0,0,0,.15));
  pointer-events: none;
}

/* ── GRAIN OVERLAY ── */
.grain-overlay {
  position: fixed; inset: 0;
  z-index: 2;
  pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ── NAV ── */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 120px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 60px;
  z-index: 100;
  mix-blend-mode: difference;
}
.nav-brand-group { display: flex; flex-direction: column; gap: 4px; }
.nav-logo { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; color: #fff; text-decoration: none; }
.nav-email {
  font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.55); text-decoration: none;
  letter-spacing: -0.01em; transition: color 0.2s; position: relative;
}
.nav-email:hover { color: #fff; }

/* email copy toast */
.copy-toast {
  position: fixed;
  background: #fff; color: #000;
  font-size: 11px; font-weight: 500;
  padding: 5px 12px;
  border-radius: 20px;
  pointer-events: none;
  z-index: 10000;
  opacity: 0;
  letter-spacing: -0.01em;
}

.nav-center-group { display: flex; align-items: center; gap: 60px; }
.nav-links { display: flex; gap: 40px; font-size: 15px; font-weight: 400; }
.nav-item { color: rgba(255,255,255,0.55); text-decoration: none; transition: color 0.2s; }
.nav-item:hover, .nav-item.active { color: #fff; }

/* ── SLOT COUNTER ── */
.slot-counter {
  display: inline-flex;
  align-items: center;
  overflow: hidden;
  vertical-align: middle;
}
.slot-digit-wrap {
  height: 1.1em;
  overflow: hidden;
  position: relative;
  display: inline-block;
}
.slot-digit-inner {
  display: flex;
  flex-direction: column;
  position: relative;
  top: 0;
  transition: none;
}
.slot-digit-inner span {
  height: 1.1em;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

/* ── ROUTER ── */
#viewRouter { position: relative; width: 100%; z-index: 10; }

/* ── HOME VIEW ── */
.home-view {
  position: fixed; inset: 0;
  opacity: 1; visibility: visible;
  pointer-events: all;
  touch-action: none;
}

/* ── SQUARE CARD ── */
.square-container {
  position: fixed;
  left: 60px; bottom: 60px;
  width: 30vw; min-width: 480px;
  aspect-ratio: 1;
  z-index: 40;
  will-change: transform;
  transform-style: preserve-3d;
  perspective: 800px;
}

.square {
  width: 100%; height: 100%;
  background: #fbfbfa;
  overflow: hidden;
  position: relative;
  border-radius: 16px;
  box-shadow: 0 30px 120px rgba(0,0,0,.28);
  backdrop-filter: blur(10px);
  transform-style: preserve-3d;
  transition: transform 0.08s ease-out, box-shadow 0.15s ease-out;
  will-change: transform;
}

/* card grain */
.square::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 16px;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 180px 180px;
  opacity: 0.04;
  pointer-events: none;
  z-index: 5;
}

.title-slide {
  position: absolute; inset: 0;
  color: #000;
  display: flex; flex-direction: column;
  justify-content: space-between;
  padding: 50px;
}
.project-number {
  font-size: 13px; font-weight: 500; letter-spacing: -0.01em; color: rgba(0,0,0,.35);
}
.project-title {
  font-size: clamp(2.4rem, 3.2vw, 4.2rem);
  line-height: 0.95; letter-spacing: -0.04em; font-weight: 500;
}
.word { display: inline-block; margin-right: .18em; will-change: transform; }
.project-tags {
  font-size: 14px; font-weight: 400; color: rgba(0,0,0,.45); line-height: 1.6; letter-spacing: -0.01em;
}

/* ── PAGE VIEWS ── */
.page-view {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  background: #fbfbfa;
  color: #000;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.case-hero {
  width: 100%; height: 75vh;
  background: #fbfbfa;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 220px 100px 80px 100px;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
.case-hero .project-number { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; color: rgba(0,0,0,.45); }
.case-hero .project-title {
  font-size: clamp(3.8rem, 6.8vw, 8rem); max-width: 85%;
  font-weight: 500; letter-spacing: -0.03em; line-height: 1.05;
}
.case-hero .project-tags { font-size: 18px; font-weight: 400; color: rgba(0,0,0,.5); letter-spacing: -0.01em; }

.case-body {
  max-width: 1440px; margin: 0 auto;
  padding: 120px 100px 0 100px;
  display: flex; flex-direction: column; gap: 140px;
}

/* ── SCROLL REVEAL ── */
.reveal-section {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1);
}
.reveal-section.revealed { opacity: 1; transform: none; }
.reveal-section.delay-1 { transition-delay: 0.08s; }
.reveal-section.delay-2 { transition-delay: 0.16s; }

.editorial-intro {
  display: grid; grid-template-columns: 1fr 2.2fr; gap: 100px; align-items: start;
}
.section-label { font-size: 14px; font-weight: 500; letter-spacing: -0.01em; color: rgba(0,0,0,.35); }
.case-desc {
  font-size: clamp(1.6rem, 2.2vw, 2.5rem);
  line-height: 1.45; color: rgba(0,0,0,0.85); font-weight: 400; letter-spacing: -0.02em;
}

.specs-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px;
  border-top: 1px solid rgba(0,0,0,.06); border-bottom: 1px solid rgba(0,0,0,.06);
  padding: 60px 0;
}
.spec-label { font-size: 13px; font-weight: 500; letter-spacing: -0.01em; color: rgba(0,0,0,.35); margin-bottom: 14px; }
.spec-value { font-size: 20px; font-weight: 400; color: rgba(0,0,0,.8); letter-spacing: -0.01em; line-height: 1.4; }

.resume-container { display: flex; flex-direction: column; gap: 48px; width: 100%; }
.resume-row {
  display: grid; grid-template-columns: 1.5fr 3fr 1fr; gap: 20px; padding: 24px 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.resume-row:first-child { border-top: 1px solid rgba(0,0,0,0.06); }
.resume-org { font-size: 18px; font-weight: 500; color: #000; }
.resume-role { font-size: 18px; font-weight: 400; color: rgba(0,0,0,0.8); }
.resume-period { font-size: 15px; font-weight: 400; color: rgba(0,0,0,0.4); text-align: right; }

/* ── IMAGE WIPE REVEAL ── */
.case-visuals { display: flex; flex-direction: column; gap: 4px; }
.img-container {
  overflow: hidden;
  position: relative;
}
.img-container img {
  width: 100%; height: auto; display: block;
  filter: grayscale(15%); transition: filter 0.5s;
  transform: scale(1.04);
  transition: transform 0.8s cubic-bezier(0.22,1,0.36,1), filter 0.5s;
}
.img-container img:hover { filter: grayscale(0%); }
.img-wipe {
  position: absolute; inset: 0;
  background: #fbfbfa;
  z-index: 2;
  transform-origin: bottom;
}

.palette-section { display: grid; grid-template-columns: 1fr 2.2fr; gap: 100px; }
.palette-row { display: flex; gap: 2px; height: 44px; width: 100%; }
.palette-swatch { flex: 1; height: 100%; }

.process-section { display: grid; grid-template-columns: 1fr 2.2fr; gap: 100px; }
.process-steps { display: flex; flex-direction: column; }
.process-step {
  display: flex; gap: 60px; align-items: flex-start;
  padding: 44px 0; border-bottom: 1px solid rgba(0,0,0,.05);
}
.process-step:first-child { border-top: 1px solid rgba(0,0,0,.05); }
.step-num { font-size: 15px; font-weight: 500; color: rgba(0,0,0,.3); letter-spacing: -0.01em; }
.step-text { font-size: 21px; line-height: 1.55; color: rgba(0,0,0,.75); font-weight: 400; letter-spacing: -0.015em; }

/* ── FOOTER ── */
.footer-nav {
  width: 100vw; position: relative;
  left: 50%; right: 50%;
  margin-left: -50vw; margin-right: -50vw;
  margin-top: 140px;
  padding: 100px 100px;
  background: #000;
  display: flex; justify-content: space-between; align-items: center;
  overflow: hidden;
}
.btn-group { display: flex; gap: 20px; }
.back-btn {
  font-size: 15px; font-weight: 500; background: #fff; color: #000; border: none;
  letter-spacing: -0.01em; padding: 18px 38px; border: 1px solid #fff;
  transition: background 0.3s, color 0.3s, border-color 0.3s; cursor: pointer;
}
.back-btn:hover { background: #000; color: #fff; border-color: rgba(255,255,255,0.4); }
.next-btn {
  font-size: 15px; font-weight: 500; background: transparent; color: #fff;
  border: 1px solid rgba(255,255,255,0.25); letter-spacing: -0.01em; padding: 18px 38px;
  transition: background 0.3s, color 0.3s, border-color 0.3s; cursor: pointer;
}
.next-btn:hover { background: #fff; color: #000; border-color: #fff; }

/* ── CONFETTI CANVAS ── */
#confetti-canvas {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 10;
}

/* ── SOUND TOGGLE ── */
.sound-toggle {
  position: fixed; bottom: 28px; right: 28px;
  z-index: 200;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.2s;
  backdrop-filter: blur(8px);
}
.sound-toggle:hover { background: rgba(255,255,255,0.22); }
.sound-toggle svg { width: 14px; height: 14px; fill: #fff; opacity: 0.7; }
.sound-toggle.muted svg.wave { display: none; }

/* ── RESPONSIVE ── */
@media(max-width:1024px) {
  .nav { padding: 0 30px; height: 90px; }
  .nav-center-group { gap: 30px; }
  .editorial-intro, .palette-section, .process-section { grid-template-columns: 1fr; gap: 32px; }
  .specs-grid { grid-template-columns: 1fr 1fr; }
  .case-hero { padding: 160px 50px 50px 50px; }
  .case-body { padding: 80px 50px 0 50px; gap: 100px; }
  .footer-nav { margin-top: 100px; padding: 60px 50px; flex-direction: column; gap: 24px; align-items: stretch; }
  .btn-group { flex-direction: column; }
  .resume-row { grid-template-columns: 1fr; gap: 8px; }
  .resume-period { text-align: left; }
}
@media(max-width:768px) {
  .nav { height: auto; padding: 24px 20px; align-items: flex-start; flex-direction: row; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
  .nav-brand-group { gap: 2px; }
  .nav-center-group { gap: 16px; }
  .nav-links { gap: 16px; }
  .square-container { left: 20px; right: 20px; bottom: 40px; width: auto; height: auto; aspect-ratio: auto; min-width: 0; }
  .square { height: auto; }
  .title-slide { position: relative; inset: auto; padding: 30px 24px; display: flex; flex-direction: column; gap: 20px; }
  .project-title { line-height: 1.05; font-size: clamp(1.8rem, 6.5vw, 2.6rem); letter-spacing: -0.02em; }
  .case-hero { padding: 140px 24px 40px 24px; height: auto; gap: 40px; }
  .case-hero .project-title { max-width:100%; font-size:clamp(2.4rem, 9vw, 4rem); }
  .case-body { padding: 60px 24px 0 24px; gap: 80px; }
  .specs-grid { grid-template-columns:1fr; gap: 24px; padding: 40px 0; }
  .footer-nav { margin-top: 80px; padding: 60px 24px; }
  .sound-toggle { bottom: 16px; right: 16px; }
}
</style>

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let current = 0;
let animating = false;
let currentView = 'index';
let soundEnabled = false;
let confettiFired = false;

const squareContainer = document.getElementById("squareContainer");

/* ═══════════════════════════════════════════
   SOUND ENGINE
═══════════════════════════════════════════ */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, duration, gain=0.15, fadeOut=true) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gainNode = ctx.createGain();
    osc.connect(gainNode);
    gainNode.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gainNode.gain.setValueAtTime(gain, ctx.currentTime);
    if (fadeOut) gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function playClick() { playTone(800, 'sine', 0.08, 0.1); }
function playWhoosh() {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.4, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(200, ctx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.3);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    src.start();
  } catch(e) {}
}

  if (!soundEnabled) return;

    setTimeout(() => playTone(f, 'sine', 0.15, 0.08), i * 40);

}

function buildSlotCounter(containerId, value) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const str = String(value).padStart(2, '0');
  container.innerHTML = '';
  str.split('').forEach(digit => {
    const wrap = document.createElement('div');
    wrap.className = 'slot-digit-wrap';

    inner.className = 'slot-digit-inner';
    for (let d = 0; d <= 9; d++) {
      const span = document.createElement('span');
      span.textContent = d;
      inner.appendChild(span);
    }
    wrap.appendChild(inner);
    container.appendChild(wrap);
    // set initial position
    inner.style.transform = `translateY(-${parseInt(digit) * 1.1}em)`;
  });
}
function rollSlotCounter(containerId, newValue) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const str = String(newValue).padStart(2, '0');
  const wraps = container.querySelectorAll('.slot-digit-wrap');
  wraps.forEach((wrap, i) => {
    const inner = wrap.querySelector('.slot-digit-inner');
    const digit = parseInt(str[i]);
    inner.style.transition = 'transform 0.55s cubic-bezier(0.22, 1, 0.36, 1)';
    inner.style.transform = `translateY(-${digit * 1.1}em)`;
    setTimeout(() => { inner.style.transition = ''; }, 600);
  });
}

/* ═══════════════════════════════════════════
   CURSOR ENGINE
═══════════════════════════════════════════ */
let mx = window.innerWidth / 2, my = window.innerHeight / 2;
let cx = mx, cy = my;
let pvx = 0, pvy = 0;
let isTouchDevice = window.matchMedia("(pointer: coarse)").matches;

if (!isTouchDevice) {
  document.addEventListener("mousemove", (e) => { mx = e.clientX; my = e.clientY; });
  (function animCursor() {
    const dx = mx - cx, dy = my - cy;
    cx += dx * 0.12; cy += dy * 0.12;

    // velocity-based stretch
    const speed = Math.sqrt(dx * dx + dy * dy);
    const angle = Math.atan2(dy, dx);
    const stretch = 1 + speed * 0.045;
    const squeeze = 1 / stretch;

    const isExpanded = cursor.classList.contains('expanded');
    if (!isExpanded) {
      cursor.style.left = cx + "px";
      cursor.style.top = cy + "px";
      cursor.style.width = (6 * stretch) + "px";
      cursor.style.height = (6 * squeeze) + "px";
      cursor.style.borderRadius = stretch > 1.3 ? '40%' : '50%';
      cursor.style.transform = `translate(-50%, -50%) rotate(${angle}rad)`;
    } else {
      cursor.style.left = cx + "px";
      cursor.style.top = cy + "px";
      cursor.style.transform = `translate(-50%, -50%)`;
      cursor.style.width = '50px';
      cursor.style.height = '50px';
      cursor.style.borderRadius = '50%';
    }
    pvx = dx; pvy = dy;
    requestAnimationFrame(animCursor);
  })();
}

function setupCursorHovers() {
  if (isTouchDevice) return;
  const elements = [square, document.getElementById("navAbout"), document.getElementById("navIndex"), document.getElementById("brandLogo"), document.getElementById("navEmail")];
  elements.forEach(el => {
    if (!el) return;
    el.addEventListener("mouseenter", () => cursor.classList.add("expanded"));
    el.addEventListener("mouseleave", () => cursor.classList.remove("expanded"));
  });
}

function bindDynamicButtons() {
  const backBtn = document.getElementById("caseBackBtn");
  const nextBtn = document.getElementById("caseNextBtn");
  if (!isTouchDevice) {
    [backBtn, nextBtn].filter(Boolean).forEach(btn => {
      btn.addEventListener("mouseenter", () => cursor.classList.add("expanded"));
      btn.addEventListener("mouseleave", () => cursor.classList.remove("expanded"));

/* ═══════════════════════════════════════════
   CARD MAGNETIC TILT
═══════════════════════════════════════════ */
let tiltRAF = null;
let targetRX = 0, targetRY = 0, currentRX = 0, currentRY = 0;

function startCardTilt() {
  if (isTouchDevice) return;
  squareContainer.addEventListener('mousemove', onTiltMove);
  squareContainer.addEventListener('mouseleave', onTiltLeave);
}

function onTiltMove(e) {
  const r = squareContainer.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width - 0.5;
  const y = (e.clientY - r.top) / r.height - 0.5;
  targetRY = x * 14;
  targetRX = -y * 14;
  square.style.boxShadow = `
    ${-x * 30}px ${-y * 20}px 80px rgba(0,0,0,0.35),
    ${-x * 5}px ${-y * 5}px 20px rgba(0,0,0,0.2)
  `;
}

function onTiltLeave() {
  targetRX = 0; targetRY = 0;
  square.style.boxShadow = '0 30px 120px rgba(0,0,0,.28)';
}

(function tiltLoop() {
  currentRX += (targetRX - currentRX) * 0.1;
  currentRY += (targetRY - currentRY) * 0.1;
  if (Math.abs(currentRX) > 0.01 || Math.abs(currentRY) > 0.01 || targetRX !== 0 || targetRY !== 0) {
    square.style.transform = `perspective(800px) rotateX(${currentRX}deg) rotateY(${currentRY}deg)`;
  }
  requestAnimationFrame(tiltLoop);
})();

let breatheT = 0;
let breatheActive = false;

function startBreath(titleSlide) {
  breatheActive = true;
  const words = [...titleSlide.querySelectorAll('.word')];

    if (!breatheActive) return;

}

/* ═══════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════ */
function fireConfetti(canvas) {
  if (confettiFired) return;
  confettiFired = true;
  playConfettiPop();

  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  const colors = ['#e94560','#f5f0e8','#4a9068','#c8b89a','#8b6914','#1D9E75','#534AB7','#fff'];
  const particles = Array.from({ length: 72 }, () => ({
    x: canvas.width * 0.25,
    y: canvas.height * 0.5,
    vx: (Math.random() - 0.5) * 18,
    vy: (Math.random() - 1.2) * 16,
    color: colors[Math.floor(Math.random() * colors.length)],
    size: Math.random() * 5 + 3,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.3,
    life: 1,
    decay: Math.random() * 0.015 + 0.012
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.45;
      p.vx *= 0.98;
      p.rotation += p.rotSpeed;
      p.life -= p.decay;
      if (p.life > 0) {
        alive = true;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        ctx.restore();
      }
    });
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

/* ═══════════════════════════════════════════
   SCROLL REVEAL — INTERSECTIONOBSERVER
═══════════════════════════════════════════ */
let revealObserver = null;

function setupScrollReveals() {
  if (revealObserver) revealObserver.disconnect();
  revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        // image wipe
        const wipes = entry.target.querySelectorAll('.img-wipe');
        wipes.forEach((wipe, i) => {
          setTimeout(() => {
            gsap.to(wipe, { scaleY: 0, duration: 0.8, ease: 'power4.inOut', transformOrigin: 'top' });
            const img = wipe.nextElementSibling;
            if (img) gsap.to(img, { scale: 1, duration: 0.9, ease: 'power3.out', delay: 0.1 });
          }, i * 120);
        });
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.reveal-section').forEach(el => revealObserver.observe(el));
  
  // confetti trigger on footer
  const footer = document.querySelector('.footer-nav');
  const canvas = document.getElementById('confetti-canvas');
  if (footer && canvas) {
    const footerObs = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) {
        fireConfetti(canvas);
        footerObs.disconnect();
      }
    }, { threshold: 0.4 });
    footerObs.observe(footer);
  }
}

function goTo(next, direction = 1) {
  if (animating || currentView !== 'index') return;
  if (next < 0) next = projects.length - 1;
  if (next >= projects.length) next = 0;
  animating = true;
  playWhoosh();

  rollSlotCounter('indexCounter', next + 1);

  const currentBGEl = gallery.querySelector(".bg-slide:last-child");
  const currentTitle = square.querySelector(".title-slide:last-child");
  const nextBGEl = createBG(projects[next].bg);
  const nextTitle = createTitle(next);

  gsap.set(nextBGEl, { clipPath: direction > 0 ? "inset(100% 0 0 0)" : "inset(0 0 100% 0)" });
  gsap.set(nextTitle, { opacity: 0, y: direction > 0 ? 40 : -40 });

  const words = nextTitle.querySelectorAll(".word");
  const tl = gsap.timeline({
    onComplete() {
      currentBGEl.remove();
      currentTitle.remove();
      current = next;
      animating = false;
    }
  });

  tl.to(nextBGEl, { clipPath: "inset(0% 0 0 0)", duration: 1.0, ease: "power4.inOut" }, 0);
  if (window.innerWidth > 768) {
    tl.to(squareContainer, { scaleY: 1.01, duration: 0.25, ease: "power2.out" }, 0);
    tl.to(squareContainer, { scaleY: 1, duration: 0.4, ease: "power4.out" }, 0.25);
  }
  tl.to(currentTitle, { y: direction > 0 ? -40 : 40, opacity: 0, duration: 0.45, ease: "power3.in" }, 0);
  tl.to(nextTitle, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.3);
  tl.fromTo(words, { y: 24, opacity: 0 }, { y: 0, opacity: 1, stagger: 0.025, duration: 0.5, ease: "power4.out" }, 0.32);
}

/* ═══════════════════════════════════════════
   EVENT BINDINGS
═══════════════════════════════════════════ */
square.addEventListener("click", () => { playClick(); switchView('project'); });
square.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") { e.preventDefault(); playClick(); switchView('project'); }
});
document.getElementById("navAbout").addEventListener("click", (e) => { e.preventDefault(); playClick(); switchView('about'); });
document.getElementById("navIndex").addEventListener("click", (e) => { e.preventDefault(); playClick(); switchView('index'); });
document.getElementById("brandLogo").addEventListener("click", (e) => { e.preventDefault(); playClick(); switchView('index'); });

window.addEventListener("wheel", (e) => {
  if (animating || currentView !== 'index') return;
  if (Math.abs(e.deltaY) < 10) return;
  if (e.deltaY > 0) goTo(current + 1, 1); else goTo(current - 1, -1);
}, { passive: true });

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && currentView !== 'index') { switchView('index'); return; }
  if (e.key === "ArrowDown" || e.key === "ArrowRight") {
    if (currentView === 'project') navigateNextProject();
    else if (currentView === 'index') goTo(current + 1, 1);
  }
  if (e.key === "ArrowUp" || e.key === "ArrowLeft") {
    if (currentView === 'index') goTo(current - 1, -1);
  }
});

let touchStartX = 0, touchStartY = 0;
window.addEventListener("touchstart", (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
window.addEventListener("touchend", (e) => {
  if (currentView !== 'index' || animating) return;
  const diffX = touchStartX - e.changedTouches[0].clientX;
  const diffY = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > 40) {
    if (diffY > 0) goTo(current + 1, 1); else goTo(current - 1, -1);
  }
});
</script>
